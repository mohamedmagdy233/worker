name: Post Ayah 5 Times
on:
  schedule:
    - cron: '0 4,8,12,16,20 * * *'
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: php p5p.php
        env:
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
